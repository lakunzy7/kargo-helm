apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kargo-helm
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
  - missingkey=error
  generators:
  - matrix:
      generators:
      - git:
          repoURL: https://github.com/lakunzy7/kargo-helm.git
          revision: HEAD
          directories:
          - path: env/*
      - list:
          elements:
          - clusterAlias: cluster1
            clusterName: in-cluster
          - clusterAlias: cluster2
            clusterName: k8slab-second-cluster
  template:
    metadata:
      name: kargo-helm-{{.path.basename}}-{{.clusterAlias}}
      annotations:
        kargo.akuity.io/authorized-stage: kargo-helm:{{.path.basename}}
    spec:
      destination:
        namespace: kargo-helm-{{.path.basename}}
        name: '{{.clusterName}}'
      project: kargo-helm
      source:
        path: charts/guestbook
        repoURL: https://github.com/lakunzy7/kargo-helm.git
        helm:
          valueFiles:
          - "/env/{{.path.basename}}/values.yaml"
          - "/env/{{.path.basename}}/feature-flags.yaml"
      syncPolicy:
        syncOptions:
        - CreateNamespace=true
