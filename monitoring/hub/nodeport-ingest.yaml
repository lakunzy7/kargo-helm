# Hub ingest NodePorts on cluster-2 so the spoke (cluster-1) can push over the
# shared kind docker bridge. Prometheus already exposes 30090 via its chart values.
#   Loki push  -> 30100
#   Tempo OTLP -> gRPC 30317, HTTP 30318
apiVersion: v1
kind: Service
metadata:
  name: loki-ingest
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: monitoring-ingest
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: single-binary
    app.kubernetes.io/instance: loki
    app.kubernetes.io/name: loki
  ports:
    - name: http-metrics
      port: 3100
      targetPort: http-metrics
      nodePort: 30100
---
apiVersion: v1
kind: Service
metadata:
  name: tempo-ingest
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: monitoring-ingest
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: tempo
    app.kubernetes.io/name: tempo
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      nodePort: 30317
    - name: otlp-http
      port: 4318
      targetPort: 4318
      nodePort: 30318
