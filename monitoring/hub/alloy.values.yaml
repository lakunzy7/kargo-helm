# Hub Alloy on cluster-2: collect this cluster's pod logs + receive OTLP traces,
# ship to the in-cluster Loki/Tempo. Metrics for cluster-2 are scraped by the
# hub Prometheus directly, so Alloy here only handles logs + traces.
controller:
  type: daemonset

alloy:
  configMap:
    create: true
    content: |-
      // ---------- logs: tail all pod logs on this node ----------
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.add_cluster.receiver]
      }

      loki.process "add_cluster" {
        stage.static_labels {
          values = { cluster = "cluster-2" }
        }
        forward_to = [loki.write.local.receiver]
      }

      loki.write "local" {
        endpoint {
          url = "http://loki.monitoring.svc:3100/loki/api/v1/push"
        }
      }

      // ---------- traces: receive OTLP, forward to local Tempo ----------
      otelcol.receiver.otlp "default" {
        grpc { endpoint = "0.0.0.0:4317" }
        http { endpoint = "0.0.0.0:4318" }
        output {
          traces = [otelcol.processor.batch.default.input]
        }
      }

      otelcol.processor.batch "default" {
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.monitoring.svc:4317"
          tls { insecure = true }
        }
      }
